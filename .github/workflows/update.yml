name: Update Svoboda.txt

on:
  schedule:
    - cron: '0 */6 * * *'  # Каждые 6 часов
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Download original Svoboda
        run: |
          curl -L "https://raw.githubusercontent.com/Temnuk/naabuzil/b355813f62e974066cec215f797e456e82d8cf8d/Svoboda" -o original.txt
          
      - name: Filter and update nodes
        run: |
          # Список стран для замены "Универсальный #N"
          countries=(
            "🇺🇸 США" "🇬🇧 Великобритания" "🇩🇪 Германия" "🇫🇷 Франция"
            "🇳🇱 Нидерланды" "🇨🇦 Канада" "🇯🇵 Япония" "🇦🇺 Австралия"
            "🇨🇭 Швейцария" "🇸🇪 Швеция" "🇫🇮 Финляндия" "🇩🇰 Дания"
            "🇪🇸 Испания" "🇮🇹 Италия" "🇵🇱 Польша" "🇷🇺 Россия"
          )
          
          # Новые заголовки (бесконечный трафик)
          cat > new_header.txt << 'EOF'
#profile-title: 🍇 Izzzy VPN
#announce: 🔰 По каким-то вопросам пишите в тг @parvizwp
#profile-update-interval: 1
#subscription-userinfo: upload=0; download=0; total=0; expire=0
#support-url: https://t.me/parvizwp
#profile-web-page-url: https://t.me/parvizwp
EOF
          
          # Обрабатываем файл: удаляем торренты и переименовываем
          > filtered.txt
          
          tail -n +7 original.txt | while IFS= read -r line; do
            # Пропускаем пустые строки
            [[ -z "$line" ]] && continue
            
            # Пропускаем ключи с Torrent
            if echo "$line" | grep -qi "torrent"; then
              continue
            fi
            
            # Заменяем "Универсальный #N" на случайную страну
            if echo "$line" | grep -qE "Универсальный #[0-9]+"; then
              random_country=${countries[$RANDOM % ${#countries[@]}]}
              # Заменяем название в строке
              line=$(echo "$line" | sed -E "s/Универсальный #[0-9]+/$random_country/")
            fi
            
            echo "$line" >> filtered.txt
          done
          
          # Объединяем заголовки и отфильтрованные ключи
          cat new_header.txt filtered.txt > Svoboda.txt
          
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Svoboda.txt
          git diff --staged --quiet || git commit -m "Auto-update Svoboda.txt $(date '+%Y-%m-%d %H:%M:%S')"
          git pull origin main --rebase || true
          git push
