name: Update Svoboda file

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Download file from source
        run: |
          curl -L -o Svoboda_raw.txt https://raw.githubusercontent.com/parviztermux12-cell/izzzy.vpn.com/main/Svoboda.txt

      - name: Replace header lines
        run: |
          # Пропускаем первые 5 строк исходного файла и добавляем свои
          tail -n +6 Svoboda_raw.txt > Svoboda_body.txt
          
          # Создаём новый файл с новым заголовком
          cat > Svoboda.txt << 'EOF'
          #profile-title: 🗽 Izzzy VPN
          #announce: 🔰 Если перестали работать обновите ключ в боте @izzzy_vpn_bot
          #profile-update-interval: 2
          #support-url: https://t.me/parvizwp
          #profile-web-page-url: https://t.me/parvizwp
          EOF
          
          # Добавляем остальное содержимое
          cat Svoboda_body.txt >> Svoboda.txt
          
          # Удаляем временные файлы
          rm Svoboda_raw.txt Svoboda_body.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Svoboda.txt
          git commit -m "Auto update: replaced header $(date '+%Y-%m-%d %H:%M')" || echo "No changes"
          git push
