   name: Update Svoboda.txt

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc
          
      - name: Download original Svoboda
        run: |
          curl -L "https://raw.githubusercontent.com/Temnuk/naabuzil/b355813f62e974066cec215f797e456e82d8cf8d/Svoboda" -o original.txt
          
      - name: Filter and test nodes
        run: |
          # Список стран с флагами
          countries=(
            "🇺🇸 США" "🇬🇧 Великобритания" "🇩🇪 Германия" "🇫🇷 Франция"
            "🇳🇱 Нидерланды" "🇨🇦 Канада" "🇯🇵 Япония" "🇦🇺 Австралия"
            "🇨🇭 Швейцария" "🇸🇪 Швеция" "🇫🇮 Финляндия" "🇩🇰 Дания"
            "🇪🇸 Испания" "🇮🇹 Италия" "🇵🇱 Польша" "🇷🇺 Россия"
            "🇰🇿 Казахстан" "🇮🇳 Индия" "🇸🇬 Сингапур" "🇰🇷 Южная Корея"
          )
          
          # Функция тестирования
          test_node() {
            local host="$1"
            local port="$2"
            
            # Проверка доступности порта
            timeout 2 bash -c "echo >/dev/tcp/$host/$port" 2>/dev/null && return 0
            return 1
          }
          
          # Заголовки (бесконечный трафик)
          cat > headers.txt << 'EOF'
#profile-title: 🍇 Izzzy VPN
#announce: 🔰 По каким-то вопросам пишите в тг @parvizwp
#profile-update-interval: 1
#subscription-userinfo: upload=0; download=0; total=0; expire=0
#support-url: https://t.me/parvizwp
#profile-web-page-url: https://t.me/parvizwp
EOF
          
          # Инициализация
          > new_links.txt
          > debug.log
          > working_nodes.txt
          
          echo "🚀 Начинаем проверку узлов..." >> debug.log
          echo "⏰ Время: $(date)" >> debug.log
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" >> debug.log
          
          # Временные файлы для счётчиков
          touch /tmp/total_nodes /tmp/working_nodes /tmp/removed_torrent /tmp/renamed_nodes
          echo "0" > /tmp/total_nodes
          echo "0" > /tmp/working_nodes
          echo "0" > /tmp/removed_torrent
          echo "0" > /tmp/renamed_nodes
          
          # Пропускаем заголовки исходного файла (первые 6 строк)
          tail -n +7 original.txt | while IFS= read -r line; do
            # Пропускаем пустые строки
            [[ -z "$line" ]] && continue
            
            # Увеличиваем счётчик
            echo $(( $(cat /tmp/total_nodes) + 1 )) > /tmp/total_nodes
            
            # Удаляем ключи с Torrent в названии
            if echo "$line" | grep -qi "torrent"; then
              echo "❌ УДАЛЕН (Torrent)" >> debug.log
              echo $(( $(cat /tmp/removed_torrent) + 1 )) > /tmp/removed_torrent
              continue
            fi
            
            # Извлекаем URL и имя
            if [[ "$line" =~ ^vless://([^#]+)#(.*)$ ]]; then
              url_part="${BASH_REMATCH[1]}"
              old_name="${BASH_REMATCH[2]}"
              
              # Очищаем имя от мусора
              old_name_clean=$(echo "$old_name" | sed 's/[[:space:]]*$//' | cut -c1-50)
              
              # Проверяем, нужно ли переименовать
              if echo "$old_name_clean" | grep -qiE "универсальный|universal|auto|default"; then
                random_country=${countries[$RANDOM % ${#countries[@]}]}
                new_name="$random_country"
                echo $(( $(cat /tmp/renamed_nodes) + 1 )) > /tmp/renamed_nodes
              else
                new_name="$old_name_clean"
              fi
              
              # Извлекаем хост и порт для теста
              host=$(echo "$url_part" | grep -oE '@[^:?]+' | sed 's/@//')
              port=$(echo "$url_part" | grep -oE ':[0-9]+' | head -1 | sed 's/://')
              [[ -z "$port" ]] && port=443
              
              # Тестируем узел
              if test_node "$host" "$port"; then
                full_url="vless://${url_part}#${new_name}"
                echo "$full_url" >> new_links.txt
                echo "✅ $new_name | $host:$port" >> working_nodes.txt
                echo "✅ РАБОТАЕТ: $new_name ($host:$port)" >> debug.log
                echo $(( $(cat /tmp/working_nodes) + 1 )) > /tmp/working_nodes
              else
                echo "⚠️ НЕ РАБОТАЕТ: $new_name ($host:$port)" >> debug.log
              fi
            fi
          done
          
          # Считываем итоговые значения
          total_nodes=$(cat /tmp/total_nodes 2>/dev/null || echo "0")
          working_nodes=$(cat /tmp/working_nodes 2>/dev/null || echo "0")
          removed_torrent=$(cat /tmp/removed_torrent 2>/dev/null || echo "0")
          renamed_nodes=$(cat /tmp/renamed_nodes 2>/dev/null || echo "0")
          
          # Собираем финальный файл
          cat headers.txt > Svoboda.txt
          echo "" >> Svoboda.txt
          echo "# Last updated: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> Svoboda.txt
          echo "# Working nodes: $working_nodes" >> Svoboda.txt
          echo "" >> Svoboda.txt
          
          cat new_links.txt >> Svoboda.txt
          
          # Финальная статистика
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" >> debug.log
          echo "📊 СТАТИСТИКА ПРОВЕРКИ:" >> debug.log
          echo "   Всего узлов в файле: $total_nodes" >> debug.log
          echo "   ✅ Рабочих узлов: $working_nodes" >> debug.log
          echo "   ❌ Удалено (Torrent): $removed_torrent" >> debug.log
          echo "   ✏️ Переименовано: $renamed_nodes" >> debug.log
          echo "   📁 Файл сохранен: Svoboda.txt" >> debug.log
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" >> debug.log
          
          # Выводим в консоль
          cat debug.log
          
          # Сохраняем количество для коммита
          echo "WORKING_COUNT=$working_nodes" >> $GITHUB_ENV
          
          # Удаляем временные файлы
          rm -f /tmp/total_nodes /tmp/working_nodes /tmp/removed_torrent /tmp/renamed_nodes
          
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Получаем последние изменения с удалённого репозитория
          git pull origin main --rebase || git pull origin main --no-rebase
          
          # Проверяем, есть ли изменения в файле
          if git diff --quiet Svoboda.txt; then
            echo "No changes detected"
          else
            git add Svoboda.txt debug.log 2>/dev/null || git add Svoboda.txt
            git commit -m "Auto-update: $(date '+%Y-%m-%d %H:%M:%S') - Working nodes: ${{ env.WORKING_COUNT }}"
            
            # Пытаемся запушить
            git push origin main || (git pull origin main --rebase && git push origin main)
          fi
